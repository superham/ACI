name: Configure Repository Settings

# Requires ADMIN_PAT secret: a Personal Access Token with 'repo' scope (including admin).
# The built-in GITHUB_TOKEN does NOT have 'administration' permission needed for
# PATCH /repos/{owner}/{repo}. Create a PAT at https://github.com/settings/tokens
# and add it as a repository secret named ADMIN_PAT.
#
# Run manually: Actions tab -> Configure Repository Settings -> Run workflow

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository settings
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          echo "=== Updating repository settings ==="
          gh api repos/${{ github.repository }} \
            --method PATCH \
            -F "delete_branch_on_merge=true" \
            -F "allow_squash_merge=true" \
            -F "allow_merge_commit=true" \
            -F "allow_rebase_merge=false" \
            -F "squash_merge_commit_title=PR_TITLE" \
            -F "squash_merge_commit_message=PR_BODY" \
            -F "allow_auto_merge=true" \
            --jq '{
              delete_branch_on_merge: .delete_branch_on_merge,
              allow_squash_merge: .allow_squash_merge,
              allow_merge_commit: .allow_merge_commit,
              allow_rebase_merge: .allow_rebase_merge,
              squash_merge_commit_title: .squash_merge_commit_title,
              squash_merge_commit_message: .squash_merge_commit_message,
              allow_auto_merge: .allow_auto_merge
            }'
          echo "=== Repository settings updated ==="

      - name: Enable secret scanning
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          echo "=== Enabling secret scanning ==="
          gh api repos/${{ github.repository }} \
            --method PATCH \
            --input - <<'EOF'
          {
            "security_and_analysis": {
              "secret_scanning": {
                "status": "enabled"
              },
              "secret_scanning_push_protection": {
                "status": "enabled"
              }
            }
          }
          EOF
          echo "=== Secret scanning configuration complete ==="

      - name: Verify final settings
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          echo "=== Final Repository Settings ==="
          gh api repos/${{ github.repository }} --jq '{
            delete_branch_on_merge: .delete_branch_on_merge,
            allow_squash_merge: .allow_squash_merge,
            allow_merge_commit: .allow_merge_commit,
            allow_rebase_merge: .allow_rebase_merge,
            squash_merge_commit_title: .squash_merge_commit_title,
            squash_merge_commit_message: .squash_merge_commit_message,
            allow_auto_merge: .allow_auto_merge,
            security_and_analysis: .security_and_analysis
          }'

name: Configure Repository Settings

on:
  workflow_dispatch:

permissions:
  administration: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository settings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Update repository settings
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              delete_branch_on_merge: true,
              allow_squash_merge: true,
              allow_merge_commit: true,
              allow_rebase_merge: false,
              squash_merge_commit_title: 'PR_TITLE',
              squash_merge_commit_message: 'PR_BODY',
              allow_auto_merge: true,
              security_and_analysis: {
                secret_scanning: {
                  status: 'enabled'
                },
                secret_scanning_push_protection: {
                  status: 'enabled'
                }
              }
            });
            console.log('Repository settings updated successfully');

            // Verify settings
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            console.log('Verified settings:');
            console.log('  delete_branch_on_merge:', repo.delete_branch_on_merge);
            console.log('  allow_squash_merge:', repo.allow_squash_merge);
            console.log('  allow_merge_commit:', repo.allow_merge_commit);
            console.log('  allow_rebase_merge:', repo.allow_rebase_merge);
            console.log('  squash_merge_commit_title:', repo.squash_merge_commit_title);
            console.log('  squash_merge_commit_message:', repo.squash_merge_commit_message);
            console.log('  allow_auto_merge:', repo.allow_auto_merge);
